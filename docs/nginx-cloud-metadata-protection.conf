# Add these rules to the public Nginx server blocks before location /.
# They block SSRF-style cloud metadata probes reported by OWASP ZAP.

location ^~ /latest/meta-data {
    return 404;
}

location ^~ /latest/user-data {
    return 404;
}

location ^~ /latest/dynamic {
    return 404;
}

location ^~ /computeMetadata/v1 {
    return 404;
}

location ^~ /metadata/instance {
    return 404;
}

location ^~ /openstack/latest/meta_data {
    return 404;
}

# Put this map in the http {} block, not inside server {}.
# Then add the if block below inside every public server {} block.
map $host $blocked_metadata_host {
    default 0;
    169.254.169.254 1;
    169.254.170.2 1;
    100.100.100.200 1;
    metadata.google.internal 1;
    metadata 1;
    instance-data 1;
}

if ($blocked_metadata_host) {
    return 404;
}
